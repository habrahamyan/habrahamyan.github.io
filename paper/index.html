<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loading…</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

  <script>
    (function() {
      const t = localStorage.getItem("theme");
      if (t) document.documentElement.setAttribute("data-theme", t);
    })();
  </script>

  <style>
    :root {
      --bg:          #ffffff;
      --text:        #222222;
      --text-muted:  #444444;
      --link:        #0066cc;
      --border:      #eeeeee;
      --border2:     #dddddd;
      --badge-bg:    #eef;
      --badge-text:  #225;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#0d1117; --text:#e6edf3; --text-muted:#8b949e; --link:#58a6ff; --border:#30363d; --border2:#30363d; --badge-bg:#161b22; --badge-text:#79c0ff; }
    }
    [data-theme="dark"]  { --bg:#0d1117; --text:#e6edf3; --text-muted:#8b949e; --link:#58a6ff; --border:#30363d; --border2:#30363d; --badge-bg:#161b22; --badge-text:#79c0ff; }
    [data-theme="light"] { --bg:#ffffff; --text:#222222; --text-muted:#444444; --link:#0066cc; --border:#eeeeee; --border2:#dddddd; --badge-bg:#eef; --badge-text:#225; }

    body {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      font: 16px/1.5 system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .back-link {
      font-size: 0.9rem;
      color: var(--link);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 1.5rem;
    }
    .back-link:hover { text-decoration: underline; }
    h1 {
      margin: 0 0 0.75rem 0;
      font-size: 1.6rem;
    }
    .meta-description {
      color: var(--text-muted);
      margin: 0 0 1rem 0;
    }
    .keywords {
      margin: 0 0 1.25rem 0;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .keywords .label { font-weight: 600; }
    .keyword-badge {
      display: inline-block;
      background: var(--badge-bg);
      color: var(--badge-text);
      padding: 0.1rem 0.4rem;
      margin: 0.15rem 0.3rem 0.15rem 0;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .pdf-actions {
      margin-bottom: 1rem;
    }
    .pdf-actions a {
      text-decoration: none;
      color: var(--link);
      font-size: 0.95rem;
    }
    .pdf-actions a:hover { text-decoration: underline; }
    .pdf-viewer {
      width: 100%;
      height: 82vh;
      border: 1px solid var(--border2);
      border-radius: 4px;
    }
    #error-msg { color: #c00; }
    #theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: var(--badge-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.3rem 0.7rem;
      font: 0.8rem/1 system-ui, sans-serif;
      cursor: pointer;
    }
    #theme-toggle:hover { opacity: 0.75; }
  </style>
</head>
<body>
  <script>
    window._katexOpts = {
      delimiters: [
        {left: "$$", right: "$$", display: true},
        {left: "$", right: "$", inline: true},
        {left: "\\(", right: "\\)", inline: true},
        {left: "\\[", right: "\\]", display: true}
      ],
      throwOnError: false
    };
    window._renderMath = function(el) {
      if (window.renderMathInElement) {
        renderMathInElement(el, window._katexOpts);
      } else {
        window._mathQueue = el;
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="if(window._mathQueue){renderMathInElement(window._mathQueue,window._katexOpts);window._mathQueue=null;}"></script>

  <button id="theme-toggle" aria-label="Toggle dark mode"></button>
  <script>
    (function() {
      const btn = document.getElementById("theme-toggle");
      function update() {
        const dark = document.documentElement.getAttribute("data-theme") === "dark" ||
          (!document.documentElement.getAttribute("data-theme") &&
           window.matchMedia("(prefers-color-scheme: dark)").matches);
        btn.textContent = dark ? "Light mode" : "Dark mode";
      }
      update();
      btn.addEventListener("click", function() {
        const dark = document.documentElement.getAttribute("data-theme") === "dark" ||
          (!document.documentElement.getAttribute("data-theme") &&
           window.matchMedia("(prefers-color-scheme: dark)").matches);
        const next = dark ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        update();
      });
    })();
  </script>

  <a class="back-link" href="/">← Back to all scripts</a>
  <div id="content"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      document.getElementById("content").innerHTML = '<p id="error-msg">No paper specified.</p>';
    } else {
      fetch("../scripts.json")
        .then(r => r.json())
        .then(items => {
          const item = items.find(i =>
            i.file.split("/").pop().replace(".pdf", "") === id
          );

          if (!item) {
            document.getElementById("content").innerHTML = '<p id="error-msg">Paper not found.</p>';
            return;
          }

          // SEO meta tags
          document.title = item.title + " – Hrach Abrahamyan";

          const metaDesc = document.createElement("meta");
          metaDesc.name = "description";
          metaDesc.content = item.description;
          document.head.appendChild(metaDesc);

          if (item.keywords && item.keywords.length) {
            const metaKw = document.createElement("meta");
            metaKw.name = "keywords";
            metaKw.content = item.keywords.join(", ");
            document.head.appendChild(metaKw);
          }

          const canonical = document.createElement("link");
          canonical.rel = "canonical";
          canonical.href = "https://habrahamyan.github.io/paper/?id=" + encodeURIComponent(id);
          document.head.appendChild(canonical);

          // Build page content
          const container = document.getElementById("content");

          const h1 = document.createElement("h1");
          h1.textContent = item.title;
          container.appendChild(h1);

          const desc = document.createElement("p");
          desc.className = "meta-description";
          desc.textContent = item.description;
          container.appendChild(desc);

          if (item.keywords && item.keywords.length) {
            const kwDiv = document.createElement("div");
            kwDiv.className = "keywords";

            const label = document.createElement("span");
            label.className = "label";
            label.textContent = "Keywords: ";
            kwDiv.appendChild(label);

            item.keywords.forEach(word => {
              const badge = document.createElement("span");
              badge.className = "keyword-badge";
              badge.textContent = word;
              kwDiv.appendChild(badge);
            });

            container.appendChild(kwDiv);
          }

          const actions = document.createElement("div");
          actions.className = "pdf-actions";
          const dlLink = document.createElement("a");
          dlLink.href = "../" + item.file;
          dlLink.textContent = "Download PDF";
          dlLink.setAttribute("download", "");
          actions.appendChild(dlLink);
          container.appendChild(actions);

          const iframe = document.createElement("iframe");
          iframe.className = "pdf-viewer";
          iframe.src = "../" + item.file;
          iframe.title = item.title;
          container.appendChild(iframe);

          window._renderMath(container);
        })
        .catch(err => {
          console.error(err);
          document.getElementById("content").innerHTML =
            '<p id="error-msg">Could not load paper data.</p>';
        });
    }
  </script>
</body>
</html>
